version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whiteboard-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - LOGGING_LEVEL_COM_WHITEBOARD=INFO
    networks:
      - whiteboard-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whiteboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - whiteboard-network
    restart: unless-stopped

networks:
  whiteboard-network:
    driver: bridge
