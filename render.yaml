services:
  - type: web
    name: whiteboard-backend
    runtime: docker
    repo: https://github.com/Astral-07/collaborative-whiteboard
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: LOGGING_LEVEL_COM_WHITEBOARD
        value: INFO
    healthCheckPath: /api/rooms
    plan: free
